name: Testing Branch Workflow

on:
  push:
    branches:
      - testing

  pull_request:
    branches:
      - testing

  workflow_run:
    workflows: ["CI - Backend & Frontend Tests"]
    types:
      - completed

permissions:
  contents: write
  actions: write

jobs:
  postman-newman-action:
    name: Run Postman Newman GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Postman Collection
        uses: SimonScholz/postman-newman-action@v1
        with:
          collection: "./collections/zipcart_collection.json"
