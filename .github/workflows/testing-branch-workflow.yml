name: Testing Branch Workflow

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # - name: Install Dependencies
      #   run: npm ci

      # ---------------- POSTMAN / NEWMAN ----------------
      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Tests
        run: newman run ./collections/zipcart_collection.json

