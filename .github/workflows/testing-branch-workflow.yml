name: Testing Branch Workflow

on:
  workflow_run:
    workflows: ["Auto Merge Develop → testing"]  # must match EXACT name
    types:
      - completed

permissions:
  contents: read

jobs:
  test-suite:
    # Only run if:
    # 1. Merge workflow succeeded
    # 2. It was merging from develop branch
    if: >
      github.event.workflow_run.conclusion == 'success' 

    runs-on: ubuntu-latest

    steps:
      - name: Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing   # IMPORTANT: ensures we test latest testing branch

      # ================= BACKEND =================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Start Backend
        run: |
          cd backend/springbootapp/springbootapp
          mvn clean install -DskipTests
          mvn spring-boot:run &

      - name: Wait for Backend
        run: sleep 25

      # ================= FRONTEND =================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd frontend/zipcartprototype
          npm install

      - name: Start Frontend
        run: |
          cd frontend/zipcartprototype
          npm start &

      - name: Wait for Frontend
        run: sleep 20

      # ================= TESTING =================
      - name: Install Playwright
        run: |
          cd frontend/zipcartprototype
          npx playwright install --with-deps

      - name: Run API Tests
        run: |
          newman run ./collections/zipcart_collection

      - name: Run E2E + Compatibility Tests
        run: |
          cd frontend/zipcartprototype
          npx playwright test
