name: Testing Branch Workflow

on:
  push:
    branches:
      -testing

  pull_request:
    branches:
      -testing
      
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  test-suite:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ================= BACKEND =================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Start Backend
        run: |
          cd backend/springbootapp/springbootapp
          mvn clean install -DskipTests
          mvn spring-boot:run &

      - name: Wait for Backend
        run: sleep 25

      # ================= FRONTEND =================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd frontend/zipcartprototype
          npm install

      - name: Start Frontend
        run: |
          cd frontend/zipcartprototype
          npm start &

      - name: Wait for Frontend
        run: sleep 20

        - name: Install Playwright
        run: |
          cd frontend/zipcartprototype
          npx playwright install --with-deps

      - name: Run API Tests
        run: |
          newman run ./collections/zipcart_collection

      - name: Run E2E + Compatibility Tests
        run: |
          cd frontend/zipcartprototype
          npx playwright test
