name: Testing Branch Workflow

on:
  push:
    branches:
      - main

  workflow_run:
    workflows: ["CI - Backend & Frontend Tests"]
    types:
      - completed

  pull_request:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  api-tests:
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java (REQUIRED for Spring Boot)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Start Backend
      - name: Start Backend
        run: |
          cd backend/springbootapp/springbootapp
          mvn clean install -DskipTests
          mvn spring-boot:run &
      
      # Wait for backend
      - name: Wait for backend to start
        run: sleep 25

      # Setup Node (stable version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install Newman
      - name: Install Newman
        run: npm install -g newman

      # Run API tests (FIXED)
      - name: Run API tests
        run: |
          newman run ./collections/zipcart_collection \
          --env-var baseUrl=http://localhost:5000/api/v1/
