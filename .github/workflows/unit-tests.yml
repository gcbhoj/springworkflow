name: Unit Tests

on:
  workflow_call:

permissions: 
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-backend:
    - name: Backend Tests
      runs-on: ubuntu-latest

      steps:

        - name: CheckOut Code
          uses: actions/checkout@v4

        - name: Setup JDK 21
          uses: actions/setup-java@v4
          with:
            distribution: "corretto" 
            java-version: "21"
            cache: "maven"

        - name: Run Backend Tests
          working-directory: backend/springbootapp/springbootapp
          run: mvn -B clean test

        - name: Upload Backend Results
          if: always()
          uses: actions/Upload-artifact@v4
          with:
            name: backend-test-Results
            path: backend/springbootapp/springbootapp/target/surefire-reports/*

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: frontend/ionicapp
        run: npm install

      - name: Run Frontend Tests
        working-directory: frontend/ionicapp
        run: npm test

      - name: Upload Frontend Results
        if: always()
        uses: actions/Upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/ionicapp/test-results/*.xml