name: Main Branch Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up env variables
        run: echo "DOCKER_USER_NAME=${{ secrets.DOCKER_USER_NAME }}" >> .env

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USER_NAME }}" --password-stdin

      - name: Build images
        run: docker compose build

      - name: Push images
        run: docker compose push

      - name: Deploy
        run: echo "Running Terraform scripts to deploy on AWS"