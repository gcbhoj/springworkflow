name: CI - Backend & Frontend Tests

on:
  push:
    branches:
      - "feature/*"
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "21"
          cache: "maven"

      - name: Run Backend Tests
        working-directory: backend/springbootapp/springbootapp
        run: mvn -B clean test

      - name: Upload Backend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/springbootapp/springbootapp/target/surefire-reports/

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: frontend/ionicapp
        run: npm install

      - name: Run Frontend Tests
        working-directory: frontend/ionicapp
        run: npm test

      - name: Upload Frontend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/ionicapp/test-results/

  publish-results:
    name: Publish Combined Test Report
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()

    steps:
      - name: Download Backend Results
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results
          path: reports/backend

      - name: Download Frontend Results
        uses: actions/download-artifact@v4
        with:
          name: frontend-test-results
          path: reports/frontend

      - name: Publish JUnit Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "reports/**/*.xml"
