name: CI - Backend & Frontend Tests

on:
  push:
    branches:
      - "feature/*"
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "21"
          cache: "maven"

      - name: Run Backend Tests
        working-directory: backend/springbootapp/springbootapp
        run: mvn -B clean test

      - name: Publish Backend Test Result
        if: success() || failure()
        uses: mikepenz/action-junit-report@v4
        with:
          report_path: backend/springbootapp/springbootapp/target/surefire-reports/
          detailed_summary: true
          include_passed: true

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: frontend/ionicapp
        run: npm install

      - name: Run Frontend Tests
        working-directory: frontend/ionicapp
        run: npm test

      - name: Publish Frontend Test Results
        if: success() || failure()
        uses: mikepenz/action-junit-report@v4
        with:
         report_path: frontend/ionicapp/coverage/
         detailed:summary: true
         include_passed: true
