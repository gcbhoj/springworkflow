<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Calculator</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div id="container">

    <!-- First Number -->
    <ion-item>
      <ion-label position="floating">First Number</ion-label>
      <ion-input
        type="number"
        [(ngModel)]="num1">
      </ion-input>
    </ion-item>

    <!-- Second Number -->
    <ion-item>
      <ion-label position="floating">Second Number</ion-label>
      <ion-input
        type="number"
        [(ngModel)]="num2">
      </ion-input>
    </ion-item>

    <!-- Buttons -->
    <ion-button expand="block" (click)="add()">
      Add
    </ion-button>

    <ion-button expand="block" color="medium" (click)="subtract()">
      Subtract
    </ion-button>

    <!-- Result -->
    <ion-card>
      <ion-card-content>
        <h2>Result: {{ result }}</h2>
      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
