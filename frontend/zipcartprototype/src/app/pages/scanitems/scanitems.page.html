<ion-header>
  <ion-toolbar>
    <div class="header-wrapper">
      <!-- Row 1: Logo + Name -->
      <div class="header-top">
        <img src="/assets/images/ZipCartLogo.png" />
        <span>Zip Cart</span>
      </div>

      <!-- Row 2: Page Title -->
      <div class="header-bottom">Barcode Scanner</div>
    </div>
  </ion-toolbar>
</ion-header>
<ion-content>
  <div class="page-container">
    <app-barcodescanner [disabled]="productDisplayed"></app-barcodescanner>
    <ion-button (click)="getProductDetails()">sendBarcode Test Only</ion-button>
    <app-scanned-product-display
      *ngIf="productDisplayed"
    ></app-scanned-product-display>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <ion-button
            expand="block"
            color="primary"
            (click)="addScannedItemToCart()"
          >
            Add Item to Cart
          </ion-button>
        </ion-col>

        <ion-col size="6">
          <ion-button
            expand="block"
            color="medium"
            (click)="onProductCleared()"
          >
            Cancel
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
